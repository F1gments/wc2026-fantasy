name: Daily Data Sync

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC — all WC games finished by then
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated public/data/ files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        run: python src/main.py sync --no-fbref
        # --no-fbref: skips FBref (returns 403 from Cloudflare in CI)
        # understat data is cached in data/cache/understat_*.json (committed)
        # FIFA player data is always fetched fresh (public endpoint, no auth)

      - name: Commit updated site data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: daily data sync $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
